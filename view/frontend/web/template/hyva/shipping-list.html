<div class="grid gap-3 relative">
    <!-- ko if: isLoading -->
    <div class="absolute inset-0 bg-white/70 backdrop-blur-[1px] z-20 rounded items-center justify-center transition-all duration-200">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
            <svg class="animate-spin h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>
    </div>
    <!-- /ko -->
    <!-- ko foreach: getRegion('before-shipping-method-form') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
    <!-- /ko -->
    <!-- ko foreach: { data: rates(), as: 'method' } -->
        <div class="rounded p-4 transition-all duration-200"
             data-bind="css: $parent.getMethodCss(method)">
            <label class="flex items-center justify-between cursor-pointer mb-0 w-full">
                <div class="flex items-center min-w-0">
                    <input type="radio" 
                           class="form-radio h-4 w-4 text-blue-600 focus:ring-blue-500 mr-4 shrink-0" 
                           name="shipping_method" 
                           required
                           data-bind="checked: $parent.selectedMethodCode, value: method.carrier_code + '_' + method.method_code" />
                    <div class="min-w-0 pl-4">
                        <span class="block text-sm font-semibold text-gray-900 leading-tight"
                              data-bind="text: method.method_title">
                        </span>
                        <span class="block text-xs text-gray-500 mt-1"
                              data-bind="text: method.carrier_title, attr: { id: 'label_carrier_' + method.method_code + '_' + method.carrier_code }">
                        </span>
                    </div>
                </div>
                <div class="text-sm font-bold text-gray-900 shrink-0 pl-3"
                     data-bind="text: $parent.formatPrice(method.amount)">
                </div>
            </label>
            <!-- InPost widget container placeholder -->
            <div data-bind="attr: { id: 'label_method_' + method.method_code + '_' + method.carrier_code }"></div>

            <!-- ko if: $parent.hasError(method) -->
            <span class="field-error shipping-field-error mt-2 text-xs text-red-600 block font-medium"
                  data-bind="text: $parent.errorValidationMessage"></span>
            <!-- /ko -->
        </div>
    <!-- /ko -->

    <!-- ko ifnot: rates().length -->
        <p class="text-sm text-gray-500" data-bind="i18n: 'Please enter your shipping address details to estimate shipping rates.'">
        </p>
    <!-- /ko -->
    <div id="onepage-checkout-shipping-method-additional-load">
        <!-- ko foreach: getRegion('shippingAdditional') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
        <!-- /ko -->
    </div>
</div>
